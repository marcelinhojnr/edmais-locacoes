<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;

const DEFAULT_EQ=[
  {id:"eq1",name:"Tobogã",category:"inflável",quantity:1},
  {id:"eq2",name:"Castelão Pula-Pula 6x6m",category:"inflável",quantity:1},
  {id:"eq3",name:"Touro Mecânico",category:"inflável",quantity:1},
  {id:"eq4",name:"Cama Elástica 2,44m",category:"inflável",quantity:1},
  {id:"eq5",name:"Cama Elástica 3,10m",category:"inflável",quantity:1},
  {id:"eq6",name:"Cama Elástica 4,27m",category:"inflável",quantity:1},

  {id:"eq10",name:"Kid Play Homem-Aranha",category:"inflável",quantity:1},
  {id:"eq11",name:"Piscina de Bolinhas",category:"inflável",quantity:1},
  {id:"eq12",name:"Multiatividades Circo",category:"inflável",quantity:1},
  {id:"eq13",name:"Canhão de Espuma",category:"inflável",quantity:1},

  {id:"eq15",name:"Cadeira",category:"mobiliário",quantity:100},
  {id:"eq16",name:"Tenda 3x3m",category:"tenda",quantity:5},
  {id:"eq17",name:"Tenda 6x6m",category:"tenda",quantity:2},
];

const CAT_ICONS={"inflável":"🏰","mobiliário":"🪑","tenda":"⛺"};
const STATUS_LABELS={confirmado:"✅ Confirmado",pendente:"⏳ Pendente","concluído":"✓ Concluído",cancelado:"✗ Cancelado"};
const MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const MESES_FULL=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const SENHA="edplus2024";
const DESP_CATS=["👷 Monitor","⛽ Gasolina","🔧 Manutenção","🧼 Limpeza","📦 Equipamento","📱 Outros"];
const PAGAMENTOS=["💸 Pix","💵 Dinheiro","💳 Cartão","🔄 Transferência"];

const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const fmtDate=d=>{if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};
const fmtRange=(s,e)=>s&&e?`${s} – ${e}`:s||e||"";
const toArr=v=>!v?[]:Array.isArray(v)?v:Object.values(v);
const fmtMoney=v=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const pad=n=>String(n).padStart(2,"0");

function timesOverlap(aS,aE,bS,bE){if(!aS||!aE||!bS||!bE)return true;return aS<bE&&aE>bS;}
function stObj(s){return({confirmado:{background:"#dcfce7",color:"#15803d"},pendente:{background:"#fef9c3",color:"#92400e"},"concluído":{background:"#f3f4f6",color:"#6b7280"},cancelado:{background:"#fee2e2",color:"#dc2626"}})[s]||{};}

/* ── Login ── */
function LoginScreen({onLogin}){
  const [pw,setPw]=useState("");const [err,setErr]=useState(false);
  const submit=()=>{if(pw===SENHA){onLogin();}else{setErr(true);setTimeout(()=>setErr(false),2000);}};
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#7c3aed,#5b21b6)",padding:20}}>
      <div style={{background:"#fff",borderRadius:24,padding:36,maxWidth:380,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
        <img src="https://edmaisbrinquedos.com.br/logo.png" style={{height:60,marginBottom:20}} alt="ED+"/>
        <h2 style={{fontSize:20,fontWeight:700,color:"#1f2937",marginBottom:6}}>Sistema de Locações</h2>
        <p style={{fontSize:13,color:"#9ca3af",marginBottom:24}}>Digite a senha para acessar</p>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}
          placeholder="Senha de acesso"
          style={{width:"100%",border:`2px solid ${err?"#f87171":"#e5e7eb"}`,borderRadius:12,padding:"12px 16px",fontSize:14,outline:"none",marginBottom:12,textAlign:"center",letterSpacing:4,boxSizing:"border-box"}}/>
        {err&&<p style={{fontSize:12,color:"#dc2626",marginBottom:8}}>Senha incorreta.</p>}
        <button onClick={submit} style={{width:"100%",background:"linear-gradient(135deg,#7c3aed,#5b21b6)",color:"#fff",border:"none",borderRadius:12,padding:"13px",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>Entrar</button>
        <p style={{fontSize:11,color:"#d1d5db",marginTop:16}}>🔒 Acesso restrito aos sócios ED+</p>
      </div>
    </div>
  );
}

/* ══ APP ══ */
function App(){
  const [logged,setLogged]=useState(()=>sessionStorage.getItem("edplus_auth")==="1");
  const [dark,setDark]=useState(()=>localStorage.getItem("edplus_dark")==="1");
  const [view,setView]=useState("dashboard");
  const [eq,setEq]=useState([]);
  const [rentals,setR]=useState([]);
  const [despesas,setD]=useState([]);
  const [loading,setLoad]=useState(true);
  const [selId,setSelId]=useState(null);
  const [editRental,setEditRental]=useState(null);

  useEffect(()=>{document.body.className=dark?"dark":"";localStorage.setItem("edplus_dark",dark?"1":"0");},[dark]);

  useEffect(()=>{
    if(!logged)return;
    const refs={eq:db.ref("edplus/equipment"),r:db.ref("edplus/rentals"),d:db.ref("edplus/despesas")};
    let done={eq:false,r:false,d:false};
    const check=()=>{if(Object.values(done).every(Boolean))setLoad(false);};
    const eqH=refs.eq.on("value",snap=>{const v=snap.val();if(v){setEq(toArr(v));}else{const o={};DEFAULT_EQ.forEach(e=>{o[e.id]=e;});refs.eq.set(o);setEq(DEFAULT_EQ);}done.eq=true;check();});
    const rH=refs.r.on("value",snap=>{const v=snap.val()||{};setR(Object.values(v).map(r=>({...r,items:toArr(r.items)})));done.r=true;check();});
    const dH=refs.d.on("value",snap=>{const v=snap.val()||{};setD(Object.values(v));done.d=true;check();});
    return()=>{refs.eq.off("value",eqH);refs.r.off("value",rH);refs.d.off("value",dH);};
  },[logged]);

  const login=()=>{sessionStorage.setItem("edplus_auth","1");setLogged(true);};
  const saveEq=async v=>{setEq(v);const o={};v.forEach(e=>{o[e.id]=e;});await db.ref("edplus/equipment").set(o);};
  const addRental=async r=>db.ref("edplus/rentals").child(r.id).set(r);
  const updateRental=async r=>db.ref("edplus/rentals").child(r.id).set(r);
  const updateStatus=async(id,s)=>db.ref("edplus/rentals").child(id).update({status:s});
  const deleteRental=async id=>db.ref("edplus/rentals").child(id).remove();
  const saveDespesa=async d=>db.ref("edplus/despesas").child(d.id).set(d);
  const deleteDespesa=async id=>db.ref("edplus/despesas").child(id).remove();

  const checkConflicts=(date,tS,tE,items,excludeId=null)=>{
    const out=[];
    for(const item of items){
      if(!item.equipmentId)continue;
      const e=eq.find(x=>x.id===item.equipmentId);if(!e)continue;
      const used=rentals.filter(r=>r.id!==excludeId&&r.status!=="cancelado"&&r.date===date&&timesOverlap(tS,tE,r.timeStart,r.timeEnd))
        .reduce((s,r)=>s+(toArr(r.items).find(i=>i.equipmentId===item.equipmentId)?.quantity||0),0);
      const avail=e.quantity-used;
      if(item.quantity>avail)out.push({name:e.name,needed:item.quantity,available:avail});
    }
    return out;
  };

  if(!logged)return<LoginScreen onLogin={login}/>;
  if(loading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"linear-gradient(135deg,#7c3aed,#5b21b6)"}}>
      <div style={{textAlign:"center"}}>
        <img src="https://edmaisbrinquedos.com.br/logo.png" style={{width:120,marginBottom:16}} alt="ED+"/>
        <p style={{color:"#fff",fontSize:14,opacity:.8}}>Carregando...</p>
      </div>
    </div>
  );

  const selRental=rentals.find(r=>r.id===selId);
  const tabs=[
    {id:"dashboard",label:"🏠 Início"},
    {id:"calendar", label:"📅 Calendário"},
    {id:"rentals",  label:"📋 Locações"},
    {id:"new",      label:"➕ Nova"},
    {id:"financeiro",label:"💰 Financeiro"},
    {id:"estoque",  label:"📦 Estoque"},
  ];

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <div style={{background:"var(--card)",boxShadow:"0 1px 4px rgba(0,0,0,.08)",position:"sticky",top:0,zIndex:10,borderBottom:"1px solid var(--border)"}}>
        <div style={{maxWidth:760,margin:"0 auto",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <img src="https://edmaisbrinquedos.com.br/logo.png" style={{height:38,objectFit:"contain"}} alt="ED+"/>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}/>
            <button onClick={()=>setDark(d=>!d)} style={{background:"var(--border)",border:"none",borderRadius:99,padding:"6px 12px",cursor:"pointer",fontSize:14,color:"var(--text)"}}>
              {dark?"☀️":"🌙"}
            </button>
          </div>
        </div>
        <div className="tab-bar" style={{borderTop:"1px solid var(--border)",maxWidth:760,margin:"0 auto"}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setView(t.id)} style={{
              padding:"10px 14px",fontSize:12,fontWeight:600,whiteSpace:"nowrap",border:"none",
              background:"none",cursor:"pointer",fontFamily:"inherit",
              borderBottom:`2px solid ${view===t.id?"var(--primary)":"transparent"}`,
              color:view===t.id?"var(--primary)":"var(--muted)",transition:"all .15s"
            }}>{t.label}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:760,margin:"0 auto",padding:"20px 16px"}}>
        {view==="dashboard"  && <Dashboard rentals={rentals} eq={eq} despesas={despesas} onView={id=>{setSelId(id);setView("detail");}}/>}
        {view==="calendar"   && <CalendarView rentals={rentals} eq={eq} onView={id=>{setSelId(id);setView("detail");}}/>}
        {view==="rentals"    && <RentalsList rentals={rentals} eq={eq} onView={id=>{setSelId(id);setView("detail");}}/>}
        {view==="new"        && <RentalForm eq={eq} rentals={rentals} checkConflicts={checkConflicts} onSave={async r=>{await addRental(r);setSelId(r.id);setView("detail");}}/>}
        {view==="edit"&&editRental && <RentalForm eq={eq} rentals={rentals} checkConflicts={checkConflicts} initial={editRental} onSave={async r=>{await updateRental(r);setSelId(r.id);setView("detail");}}/>}
        {view==="financeiro" && <Financeiro rentals={rentals} despesas={despesas} eq={eq} onSaveDespesa={saveDespesa} onDeleteDespesa={deleteDespesa}/>}
        {view==="estoque"    && <Estoque eq={eq} rentals={rentals} onSave={saveEq}/>}
        {view==="detail"&&selRental && <RentalDetail rental={selRental} eq={eq}
          onBack={()=>setView("rentals")}
          onEdit={()=>{setEditRental(selRental);setView("edit");}}
          onStatus={s=>updateStatus(selRental.id,s)}
          onDelete={async()=>{await deleteRental(selRental.id);setView("rentals");}}/>}
      </div>
    </div>
  );
}

/* ── Dashboard ── */
function Dashboard({rentals,eq,despesas,onView}){
  const today=new Date().toISOString().split("T")[0];
  const now=new Date();
  const mesAtual=now.getMonth();const anoAtual=now.getFullYear();
  const mesPrev=mesAtual===0?11:mesAtual-1;const anoPrev=mesAtual===0?anoAtual-1:anoAtual;

  const rMes=rentals.filter(r=>r.status!=="cancelado"&&r.date&&r.date.startsWith(`${anoAtual}-${pad(mesAtual+1)}`));
  const rPrev=rentals.filter(r=>r.status!=="cancelado"&&r.date&&r.date.startsWith(`${anoPrev}-${pad(mesPrev+1)}`));
  const faturaMes=rMes.reduce((s,r)=>s+Number(r.valor||0),0);
  const faturaPrev=rPrev.reduce((s,r)=>s+Number(r.valor||0),0);
  const crescimento=faturaPrev>0?((faturaMes-faturaPrev)/faturaPrev*100).toFixed(0):null;

  const upcoming=rentals.filter(r=>r.date>=today&&r.status!=="cancelado").sort((a,b)=>a.date.localeCompare(b.date));
  const todayR=upcoming.filter(r=>r.date===today);
  const nextR=upcoming.filter(r=>r.date>today);
  const active=rentals.filter(r=>r.status==="pendente"||r.status==="confirmado").length;
  const pendPag=rentals.filter(r=>r.statusPagamento==="pendente"&&r.status!=="cancelado").length;

  const stats=[
    {icon:"🎉",label:"Hoje",val:todayR.length,bg:"#fff7ed",col:"#c2410c"},
    {icon:"✅",label:"Ativas",val:active,bg:"#f0fdf4",col:"#15803d"},
    {icon:"💰",label:"Faturado",val:fmtMoney(faturaMes),bg:"#f5f3ff",col:"#6d28d9",small:true},
    {icon:"⏳",label:"Pag. Pend.",val:pendPag,bg:"#fef9c3",col:"#92400e"},
  ];

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <h1 style={{fontSize:22,fontWeight:700,color:"var(--text)"}}>Olá, ED+ 👋</h1>
        {crescimento!==null&&<span style={{fontSize:12,fontWeight:600,color:Number(crescimento)>=0?"#16a34a":"#dc2626",background:Number(crescimento)>=0?"#f0fdf4":"#fef2f2",padding:"4px 10px",borderRadius:99}}>
          {Number(crescimento)>=0?"↑":"↓"} {Math.abs(crescimento)}% vs mês ant.
        </span>}
      </div>
      <p style={{fontSize:13,color:"var(--muted)",marginBottom:20}}>{MESES_FULL[mesAtual]} {anoAtual}</p>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:24}}>
        {stats.map(s=>(
          <div key={s.label} style={{background:s.bg,borderRadius:14,padding:"14px 10px"}}>
            <div style={{fontSize:18,marginBottom:4}}>{s.icon}</div>
            <div style={{fontSize:s.small?13:20,fontWeight:700,color:s.col,lineHeight:1.2}}>{s.val}</div>
            <div style={{fontSize:11,fontWeight:600,color:s.col,opacity:.75,marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>

      <MiniChart rentals={rentals}/>

      {todayR.length>0&&<><h2 style={sh}>🎉 Hoje</h2>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {todayR.map(r=><RCard key={r.id} r={r} eq={eq} onClick={()=>onView(r.id)} hi/>)}
        </div></>}
      <h2 style={sh}>📅 Próximas Locações</h2>
      {nextR.length===0?<Blank>Nenhuma locação futura</Blank>
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>
          {nextR.slice(0,5).map(r=><RCard key={r.id} r={r} eq={eq} onClick={()=>onView(r.id)}/>)}
        </div>}
    </div>
  );
}

function MiniChart({rentals}){
  const canvasRef=useRef(null);
  const chartRef=useRef(null);
  const now=new Date();

  const data=useMemo(()=>{
    const months=[];
    for(let i=5;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      const key=`${d.getFullYear()}-${pad(d.getMonth()+1)}`;
      const count=rentals.filter(r=>r.status!=="cancelado"&&(r.date||"").startsWith(key)).length;
      const valor=rentals.filter(r=>r.status!=="cancelado"&&(r.date||"").startsWith(key)).reduce((s,r)=>s+Number(r.valor||0),0);
      months.push({label:MESES[d.getMonth()],count,valor});
    }
    return months;
  },[rentals]);

  useEffect(()=>{
    if(!canvasRef.current)return;
    if(chartRef.current)chartRef.current.destroy();
    const isDark=document.body.classList.contains("dark");
    const gridColor=isDark?"rgba(255,255,255,.08)":"rgba(0,0,0,.06)";
    const textColor=isDark?"#94a3b8":"#9ca3af";
    chartRef.current=new Chart(canvasRef.current,{
      type:"bar",
      data:{
        labels:data.map(d=>d.label),
        datasets:[
          {label:"Locações",data:data.map(d=>d.count),backgroundColor:"rgba(124,58,237,.7)",borderRadius:6,yAxisID:"y"},
          {label:"Faturamento",data:data.map(d=>d.valor),type:"line",borderColor:"#f59e0b",backgroundColor:"rgba(245,158,11,.1)",fill:true,tension:.4,pointRadius:4,pointBackgroundColor:"#f59e0b",yAxisID:"y1"}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
        plugins:{legend:{labels:{color:textColor,font:{family:"Poppins",size:11},boxWidth:12}}},
        scales:{
          x:{grid:{color:gridColor},ticks:{color:textColor,font:{family:"Poppins",size:11}}},
          y:{grid:{color:gridColor},ticks:{color:textColor,font:{family:"Poppins",size:11}},title:{display:true,text:"Qtd",color:textColor,font:{size:10}}},
          y1:{position:"right",grid:{drawOnChartArea:false},ticks:{color:"#f59e0b",font:{family:"Poppins",size:10},callback:v=>v>=1000?`R$${(v/1000).toFixed(0)}k`:`R$${v}`}}
        }
      }
    });
    return()=>chartRef.current?.destroy();
  },[data]);

  return(
    <div style={{background:"var(--card)",borderRadius:16,border:"1px solid var(--border)",padding:16,marginBottom:24}}>
      <p style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:12}}>📈 Últimos 6 meses</p>
      <div style={{height:180}}><canvas ref={canvasRef}/></div>
    </div>
  );
}

/* ── Calendário ── */
function CalendarView({rentals,eq,onView}){
  const today=new Date();
  const [cur,setCur]=useState({y:today.getFullYear(),m:today.getMonth()});
  const [selDay,setSelDay]=useState(null);
  const days=new Date(cur.y,cur.m+1,0).getDate();
  const fst=new Date(cur.y,cur.m,1).getDay();
  const todayStr=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  const rMap={};
  rentals.filter(r=>r.status!=="cancelado").forEach(r=>{if(!rMap[r.date])rMap[r.date]=[];rMap[r.date].push(r);});
  const prev=()=>setCur(c=>c.m===0?{y:c.y-1,m:11}:{y:c.y,m:c.m-1});
  const next=()=>setCur(c=>c.m===11?{y:c.y+1,m:0}:{y:c.y,m:c.m+1});
  const key=(d)=>`${cur.y}-${pad(cur.m+1)}-${pad(d)}`;
  const selKey=selDay?key(selDay):null;
  const selR=selKey?(rMap[selKey]||[]):[];
  return(
    <div>
      <h1 style={{fontSize:22,fontWeight:700,color:"var(--text)",marginBottom:20}}>📅 Calendário</h1>
      <div style={{background:"var(--card)",borderRadius:20,border:"1px solid var(--border)",overflow:"hidden",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:"1px solid var(--border)"}}>
          <button onClick={prev} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"var(--primary)",padding:"4px 8px"}}>‹</button>

                {d}
                {rs.length>0&&<div style={{display:"flex",gap:2}}>
                  {rs.slice(0,3).map((r,ri)=>(
                    <div key={ri} style={{width:5,height:5,borderRadius:"50%",background:isS?"#fff":r.status==="confirmado"?"#22c55e":"#f59e0b"}}/>
                  ))}
                </div>}
              </button>
            );
          })}
        </div>
      </div>
      <div style={{display:"flex",gap:16,marginBottom:16,flexWrap:"wrap"}}>
        {[["#22c55e","Confirmado"],["#f59e0b","Pendente"]].map(([c,l])=>(

            <div style={{width:8,height:8,borderRadius:"50%",background:c}}/>{l}
          </div>
        ))}
      </div>
      {selDay&&<div>
        <h2 style={{...sh,marginBottom:12}}>Locações em {pad(selDay)}/{pad(cur.m+1)}/{cur.y}
          <span style={{fontSize:12,fontWeight:500,color:"var(--muted)",marginLeft:8}}>({selR.length})</span>
        </h2>
        {selR.length===0?<Blank>Nenhuma locação neste dia</Blank>
          :<div style={{display:"flex",flexDirection:"column",gap:8}}>
            {selR.map(r=><RCard key={r.id} r={r} eq={eq} onClick={()=>onView(r.id)}/>)}
          </div>}
      </div>}
    </div>
  );
}

/* ── Lista de locações ── */
function RentalsList({rentals,eq,onView}){
  const [filter,setF]=useState("all");const [search,setS]=useState("");
  const list=rentals
    .filter(r=>filter==="all"||r.status===filter)
    .filter(r=>!search||(r.titularName||"").toLowerCase().includes(search.toLowerCase())||(r.location||"").toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>b.date.localeCompare(a.date));

        {[["all","Todas"],["pendente","Pendentes"],["confirmado","Confirmadas"],["concluído","Concluídas"],["cancelado","Canceladas"]].map(([v,l])=>(

        ))}

/* ── Formulário Locação ── */
function RentalForm({eq,rentals,checkConflicts,onSave,initial}){
  const isEdit=!!initial;
  const empty={date:"",timeStart:"",timeEnd:"",location:"",phone:"",titularName:"",renterName:"",monitors:"",notes:"",status:"pendente",statusPagamento:"pendente",formaPagamento:"",valor:"",items:[{equipmentId:"",quantity:1}]};
  const [form,setForm]=useState(initial?{...empty,...initial,items:toArr(initial.items)}:empty);
  const [conflicts,setConf]=useState([]);const [sub,setSub]=useState(false);const [saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const recheck=(patch={})=>{const f={...form,...patch};if(f.date)setConf(checkConflicts(f.date,f.timeStart,f.timeEnd,f.items.filter(i=>i.equipmentId),isEdit?initial.id:null));};
  const updItem=(idx,k,v)=>{const items=[...form.items];items[idx]={...items[idx],[k]:v};setForm(f=>({...f,items}));if(form.date)setConf(checkConflicts(form.date,form.timeStart,form.timeEnd,items.filter(i=>i.equipmentId),isEdit?initial.id:null));};
  const avail=(eqId)=>{
    if(!form.date||!eqId)return null;
    const e=eq.find(x=>x.id===eqId);if(!e)return null;
    const used=rentals.filter(r=>r.id!==(isEdit?initial.id:null)&&r.status!=="cancelado"&&r.date===form.date&&timesOverlap(form.timeStart,form.timeEnd,r.timeStart,r.timeEnd))
      .reduce((s,r)=>s+(toArr(r.items).find(i=>i.equipmentId===eqId)?.quantity||0),0);
    return e.quantity-used;
  };
  const timeInvalid=form.timeStart&&form.timeEnd&&form.timeStart>=form.timeEnd;
  const submit=async()=>{
    setSub(true);const valid=form.items.filter(i=>i.equipmentId);
    if(!form.titularName||!form.date||!form.location||!form.phone||!valid.length||conflicts.length||timeInvalid)return;
    setSaving(true);
    await onSave({...(isEdit?initial:{}),id:isEdit?initial.id:genId(),...form,items:valid,updatedAt:new Date().toISOString(),...(!isEdit?{createdAt:new Date().toISOString()}:{})});
    setSaving(false);
  };
  const err=f=>sub&&!form[f];
  return(
    <div>
      <h1 style={{fontSize:22,fontWeight:700,color:"var(--text)",marginBottom:20}}>{isEdit?"✏️ Editar Locação":"➕ Nova Locação"}</h1>
      <div style={{background:"var(--card)",borderRadius:20,border:"1px solid var(--border)",padding:20,display:"flex",flexDirection:"column",gap:16}}>
        <div style={{display:"flex",gap:10}}>
          <Field label="Data *" err={err("date")} style={{flex:2}}>
            <input type="date" value={form.date} onChange={e=>{set("date",e.target.value);recheck({date:e.target.value});}} style={{...inp,borderColor:err("date")?"#f87171":"var(--border)"}}/>
          </Field>
          <Field label="Início" style={{flex:1}}><input type="time" value={form.timeStart} onChange={e=>{set("timeStart",e.target.value);recheck({timeStart:e.target.value});}} style={inp}/></Field>
          <Field label="Término" style={{flex:1}}><input type="time" value={form.timeEnd} onChange={e=>{set("timeEnd",e.target.value);recheck({timeEnd:e.target.value});}} style={inp}/></Field>
        </div>
        {timeInvalid&&<Alert color="#c2410c" bg="#fff7ed" border="#fed7aa">⚠️ Término deve ser depois do início.</Alert>}
        <Field label="Local *" err={err("location")}><input value={form.location} onChange={e=>set("location",e.target.value)} placeholder="Endereço completo" style={{...inp,borderColor:err("location")?"#f87171":"var(--border)"}}/></Field>
        <Field label="Telefone *" err={err("phone")}><input type="tel" value={form.phone} onChange={e=>set("phone",e.target.value)} placeholder="(31) 9 0000-0000" style={{...inp,borderColor:err("phone")?"#f87171":"var(--border)"}}/></Field>
        <div style={{display:"flex",gap:10}}>
          <Field label="Titular *" err={err("titularName")} style={{flex:1}}><input value={form.titularName} onChange={e=>set("titularName",e.target.value)} placeholder="Quem está alugando" style={{...inp,borderColor:err("titularName")?"#f87171":"var(--border)"}}/></Field>
          <Field label="Resp. no Local" style={{flex:1}}><input value={form.renterName} onChange={e=>set("renterName",e.target.value)} placeholder="Quem receberá" style={inp}/></Field>
        </div>
        <Field label="👷 Monitor(es)"><input value={form.monitors||""} onChange={e=>set("monitors",e.target.value)} placeholder="Ex: João Silva, Maria Souza" style={inp}/></Field>

        {/* Financeiro */}
        <div style={{background:"var(--bg)",borderRadius:12,padding:14,display:"flex",flexDirection:"column",gap:12}}>
          <p style={{fontSize:12,fontWeight:700,color:"var(--primary)",margin:0}}>💰 Financeiro</p>
          <div style={{display:"flex",gap:10}}>
            <Field label="Valor Total (R$)" style={{flex:1}}><input type="number" min="0" step="0.01" value={form.valor||""} onChange={e=>set("valor",e.target.value)} placeholder="0,00" style={inp}/></Field>
            <Field label="Forma de Pagamento" style={{flex:1}}>
              <select value={form.formaPagamento||""} onChange={e=>set("formaPagamento",e.target.value)} style={inp}>
                <option value="">Selecionar...</option>
                {PAGAMENTOS.map(p=><option key={p} value={p}>{p}</option>)}
              </select>
            </Field>
          </div>
          <Field label="Status do Pagamento">
            <div style={{display:"flex",gap:8}}>
              {[["pendente","🔴 Pendente"],["parcial","💛 Parcial"],["pago","💚 Pago"]].map(([v,l])=>(
                <button key={v} onClick={()=>set("statusPagamento",v)} type="button" style={{flex:1,padding:"8px 4px",borderRadius:10,border:"1px solid",fontFamily:"inherit",fontSize:12,fontWeight:600,cursor:"pointer",background:form.statusPagamento===v?"var(--primary)":"var(--card)",color:form.statusPagamento===v?"#fff":"var(--muted)",borderColor:form.statusPagamento===v?"var(--primary)":"var(--border)",transition:"all .15s"}}>{l}</button>
              ))}
            </div>
          </Field>
        </div>

        {/* Itens */}
        <div>
          <label style={{fontSize:12,fontWeight:600,color:"var(--text)",display:"block",marginBottom:8}}>Itens Locados *</label>
          {conflicts.length>0&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"10px 14px",marginBottom:10}}>
            <p style={{color:"#dc2626",fontSize:13,fontWeight:700,margin:"0 0 4px"}}>⚠️ Conflito no período!</p>
            {conflicts.map((c,i)=><p key={i} style={{fontSize:12,color:"#dc2626",margin:"2px 0"}}>• {c.name}: pedido {c.needed}, disponível: {c.available}</p>)}
          </div>}
          {sub&&!form.items.filter(i=>i.equipmentId).length&&<p style={{fontSize:12,color:"#dc2626",marginBottom:6}}>Adicione ao menos um item</p>}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {form.items.map((item,idx)=>{
              const isConf=conflicts.some(c=>{const e=eq.find(x=>x.id===item.equipmentId);return e&&c.name===e.name;});
              return(
                <div key={idx} style={{display:"flex",gap:8,alignItems:"center"}}>
                  <select value={item.equipmentId} onChange={e=>updItem(idx,"equipmentId",e.target.value)} style={{...inp,flex:1,borderColor:isConf?"#f87171":"var(--border)"}}>
                    <option value="">Selecionar item...</option>
                    {["inflável","mobiliário","tenda"].map(cat=>{
                      const ci=eq.filter(e=>e.category===cat);if(!ci.length)return null;
                      return<optgroup key={cat} label={`${CAT_ICONS[cat]} ${cat}`}>{ci.map(e=>{const a=avail(e.id);return<option key={e.id} value={e.id}>{e.name}{form.date&&a!==null?` (disp: ${a})`:""}</option>;})}</optgroup>;
                    })}
                  </select>
                  <input type="number" min="1" value={item.quantity} onChange={e=>updItem(idx,"quantity",parseInt(e.target.value)||1)} style={{...inp,width:60,textAlign:"center"}}/>
                  {form.items.length>1&&<button onClick={()=>setForm(f=>({...f,items:f.items.filter((_,i)=>i!==idx)}))} style={{color:"#f87171",background:"none",border:"none",fontSize:16,cursor:"pointer",padding:"0 4px"}}>✕</button>}
                </div>
              );
            })}
          </div>
          <button onClick={()=>setForm(f=>({...f,items:[...f.items,{equipmentId:"",quantity:1}]}))} style={{marginTop:8,fontSize:13,color:"var(--primary)",fontWeight:600,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit"}}>+ Adicionar item</button>
        </div>

        <Field label="Observações"><textarea value={form.notes} onChange={e=>set("notes",e.target.value)} rows={2} placeholder="Anotações adicionais..." style={{...inp,resize:"none"}}/></Field>
        <Field label="Status">
          <select value={form.status} onChange={e=>set("status",e.target.value)} style={{...inp,width:"auto"}}>
            <option value="pendente">⏳ Pendente</option>
            <option value="confirmado">✅ Confirmado</option>
          </select>
        </Field>
        <button onClick={submit} disabled={conflicts.length>0||!!timeInvalid||saving} style={{width:"100%",padding:"13px",borderRadius:14,border:"none",fontFamily:"inherit",cursor:(conflicts.length>0||timeInvalid||saving)?"not-allowed":"pointer",background:(conflicts.length>0||timeInvalid)?"#d1d5db":"var(--primary)",color:"#fff",fontWeight:700,fontSize:15,transition:"background .15s"}}>
          {saving?"Salvando...":(isEdit?"Salvar Alterações":"Salvar Locação")}
        </button>
      </div>
    </div>
  );
}

            <img src="https://edmaisbrinquedos.com.br/logo.png" style={{height:36,objectFit:"contain",opacity:.9}} alt="ED+"/>
          </div>
        </div>
        <div style={{padding:"8px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",...stObj(rental.status)}}>
          <span style={{fontSize:13,fontWeight:600}}>{STATUS_LABELS[rental.status]}</span>
          <span style={{fontSize:11,opacity:.6}}>#{(rental.id||"").slice(-6).toUpperCase()}</span>
        </div>
        <div style={{padding:"16px 20px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <IF label="📍 Local" val={rental.location}/>
          <IF label="📱 Telefone" val={rental.phone}/>
          <IF label="👤 Titular" val={rental.titularName}/>
          {rental.renterName&&<IF label="🧑 Resp. no Local" val={rental.renterName}/>}
          {timeStr&&<IF label="🕐 Horário" val={timeStr}/>}
          {rental.monitors&&<IF label="👷 Monitor(es)" val={rental.monitors}/>}
          {rental.valor&&<IF label="💰 Valor" val={fmtMoney(rental.valor)}/>}
          {rental.formaPagamento&&<IF label="💳 Pagamento" val={rental.formaPagamento}/>}
          {rental.statusPagamento&&<IF label="💸 Status Pag." val={rental.statusPagamento==="pago"?"💚 Pago":rental.statusPagamento==="parcial"?"💛 Parcial":"🔴 Pendente"}/>}
        </div>
        <div style={{padding:"0 20px 16px"}}>
          <p style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Itens Locados</p>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {toArr(rental.items).map((item,i)=>{const e=eq.find(x=>x.id===item.equipmentId);if(!e)return null;
              return<div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"var(--bg)",borderRadius:10,padding:"8px 12px"}}>
                <span style={{fontSize:18}}>{CAT_ICONS[e.category]}</span>
                <span style={{flex:1,fontSize:13,fontWeight:600,color:"var(--text)"}}>{e.name}</span>
                <span style={{fontSize:13,fontWeight:700,color:"var(--primary)"}}>{item.quantity}x</span>
              </div>;
            })}
          </div>
        </div>
        {rental.notes&&<div style={{padding:"0 20px 16px"}}>
          <p style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Observações</p>
          <p style={{fontSize:13,color:"var(--sub)",background:"var(--bg)",borderRadius:10,padding:"8px 12px",margin:0}}>{rental.notes}</p>
        </div>}

        {/* Ações */}
        <div style={{borderTop:"1px solid var(--border)",padding:"14px 20px",display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",gap:8}}>
            <button onClick={printGuia} style={{flex:1,padding:"10px",borderRadius:12,border:"none",background:"#7c3aed",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🖨️ Imprimir / PDF</button>
            <button onClick={enviarWhats} style={{flex:1,padding:"10px",borderRadius:12,border:"none",background:"#22c55e",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>📱 WhatsApp</button>
          </div>
          <button onClick={onEdit} style={{width:"100%",padding:"10px",borderRadius:12,border:"1px solid var(--primary)",background:"transparent",color:"var(--primary)",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>✏️ Editar esta locação</button>
          <p style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Atualizar Status</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {[["pendente","⏳ Pendente"],["confirmado","✅ Confirmado"],["concluído","✓ Concluído"],["cancelado","✗ Cancelar"]].map(([s,l])=>(
              <button key={s} onClick={()=>onStatus(s)} style={{padding:"6px 12px",borderRadius:99,fontSize:12,fontWeight:600,cursor:"pointer",border:"1px solid",fontFamily:"inherit",background:rental.status===s?"var(--primary)":"var(--card)",color:rental.status===s?"#fff":"var(--muted)",borderColor:rental.status===s?"var(--primary)":"var(--border)",transition:"all .15s"}}>{l}</button>
            ))}
          </div>
          {!del?<button onClick={()=>setDel(true)} style={{fontSize:12,color:"#f87171",background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit"}}>🗑 Excluir locação</button>
            :<div style={{display:"flex",gap:10,alignItems:"center"}}>
              <span style={{fontSize:12,color:"#dc2626"}}>Confirmar?</span>
              <button onClick={onDelete} style={{fontSize:12,color:"#dc2626",fontWeight:700,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Sim</button>
              <button onClick={()=>setDel(false)} style={{fontSize:12,color:"var(--muted)",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button>
            </div>}
        </div>
      </div>
    </div>
  );
}

/* ── FINANCEIRO ── */
function Financeiro({rentals,despesas,eq,onSaveDespesa,onDeleteDespesa}){
  const [tab,setTab]=useState("resumo");
  const [filMes,setFilMes]=useState(()=>{const n=new Date();return`${n.getFullYear()}-${pad(n.getMonth()+1)}`;});
  const [showDespForm,setSDF]=useState(false);
  const [despForm,setDF]=useState({data:"",categoria:DESP_CATS[0],descricao:"",valor:"",formaPagamento:PAGAMENTOS[0]});
  const canvasRef=useRef(null);const chartRef=useRef(null);

  const rFiltradas=rentals.filter(r=>r.status!=="cancelado"&&(r.date||"").startsWith(filMes));
  const despFiltradas=despesas.filter(d=>(d.data||"").startsWith(filMes));
  const receita=rFiltradas.reduce((s,r)=>s+Number(r.valor||0),0);
  const despTotal=despFiltradas.reduce((s,d)=>s+Number(d.valor||0),0);
  const lucro=receita-despTotal;
  const recebido=rFiltradas.filter(r=>r.statusPagamento==="pago").reduce((s,r)=>s+Number(r.valor||0),0);
  const pendente=rFiltradas.filter(r=>r.statusPagamento!=="pago").reduce((s,r)=>s+Number(r.valor||0),0);

  // Ranking itens
  const itemCount={};
  rentals.filter(r=>r.status!=="cancelado").forEach(r=>{toArr(r.items).forEach(i=>{if(i.equipmentId){itemCount[i.equipmentId]=(itemCount[i.equipmentId]||0)+1;}});});
  const ranking=Object.entries(itemCount).map(([id,c])=>({e:eq.find(x=>x.id===id),c})).filter(x=>x.e).sort((a,b)=>b.c-a.c).slice(0,5);

  // Gráfico despesas por categoria
  useEffect(()=>{
    if(tab!=="despesas"||!canvasRef.current)return;
    if(chartRef.current)chartRef.current.destroy();
    const cats={};despesas.forEach(d=>{cats[d.categoria]=(cats[d.categoria]||0)+Number(d.valor||0);});
    const isDark=document.body.classList.contains("dark");
    const textColor=isDark?"#94a3b8":"#9ca3af";
    chartRef.current=new Chart(canvasRef.current,{
      type:"doughnut",
      data:{labels:Object.keys(cats),datasets:[{data:Object.values(cats),backgroundColor:["#7c3aed","#f59e0b","#22c55e","#3b82f6","#ec4899","#94a3b8"],borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:textColor,font:{family:"Poppins",size:11},boxWidth:12}}}}
    });
    return()=>chartRef.current?.destroy();
  },[tab,despesas]);

  const saveDespesa=async()=>{
    if(!despForm.data||!despForm.valor)return;
    await onSaveDespesa({id:genId(),...despForm,createdAt:new Date().toISOString()});
    setDF({data:"",categoria:DESP_CATS[0],descricao:"",valor:"",formaPagamento:PAGAMENTOS[0]});
    setSDF(false);
  };

  const subTabs=[["resumo","📊 Resumo"],["historico","📋 Histórico"],["despesas","💸 Despesas"],["relatorio","📈 Relatório"]];

  return(
    <div>
      <h1 style={{fontSize:22,fontWeight:700,color:"var(--text)",marginBottom:16}}>💰 Financeiro</h1>

      {/* Filtro de mês */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <label style={{fontSize:12,fontWeight:600,color:"var(--muted)"}}>Período:</label>
        <input type="month" value={filMes} onChange={e=>setFilMes(e.target.value)} style={{...inp,width:"auto",padding:"6px 12px"}}/>
      </div>

      {/* Sub tabs */}
      <div style={{display:"flex",gap:4,marginBottom:20,borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
        {subTabs.map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{padding:"8px 14px",fontSize:12,fontWeight:600,border:"none",background:"none",cursor:"pointer",fontFamily:"inherit",borderBottom:`2px solid ${tab===v?"var(--primary)":"transparent"}`,color:tab===v?"var(--primary)":"var(--muted)",whiteSpace:"nowrap"}}>{l}</button>
        ))}
      </div>

      {tab==="resumo"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
            {[
              {icon:"💰",label:"Faturamento",val:fmtMoney(receita),bg:"#f5f3ff",col:"#6d28d9"},
              {icon:"💚",label:"Recebido",val:fmtMoney(recebido),bg:"#f0fdf4",col:"#15803d"},
              {icon:"⏳",label:"A Receber",val:fmtMoney(pendente),bg:"#fef9c3",col:"#92400e"},
              {icon:"💸",label:"Despesas",val:fmtMoney(despTotal),bg:"#fef2f2",col:"#dc2626"},
              {icon:"📈",label:"Lucro Estimado",val:fmtMoney(lucro),bg:lucro>=0?"#f0fdf4":"#fef2f2",col:lucro>=0?"#15803d":"#dc2626"},
              {icon:"🎪",label:"Locações",val:rFiltradas.length,bg:"#eff6ff",col:"#1d4ed8"},
            ].map(s=>(
              <div key={s.label} style={{background:s.bg,borderRadius:14,padding:"14px 16px"}}>
                <div style={{fontSize:20,marginBottom:4}}>{s.icon}</div>
                <div style={{fontSize:16,fontWeight:700,color:s.col}}>{s.val}</div>
                <div style={{fontSize:11,fontWeight:600,color:s.col,opacity:.75}}>{s.label}</div>
              </div>
            ))}
          </div>

          <h2 style={sh}>🏆 Itens Mais Alugados</h2>
          <div style={{background:"var(--card)",borderRadius:16,border:"1px solid var(--border)",overflow:"hidden"}}>
            {ranking.length===0?<div style={{padding:20,textAlign:"center",color:"var(--muted)",fontSize:13}}>Sem dados ainda</div>
              :ranking.map(({e,c},i)=>(
                <div key={e.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:i<ranking.length-1?"1px solid var(--border)":"none"}}>
                  <span style={{fontSize:18,fontWeight:700,color:"var(--muted)",width:24}}>#{i+1}</span>
                  <span style={{fontSize:16}}>{CAT_ICONS[e.category]}</span>
                  <span style={{flex:1,fontSize:13,fontWeight:600,color:"var(--text)"}}>{e.name}</span>
                  <span style={{fontSize:13,fontWeight:700,color:"var(--primary)"}}>{c}x</span>
                </div>
              ))}
          </div>
        </div>
      )}

      {tab==="historico"&&(
        <div>
          <h2 style={sh}>📋 Histórico de Locações — {MESES_FULL[parseInt(filMes.split("-")[1])-1]}</h2>
          {rFiltradas.length===0?<Blank>Nenhuma locação neste período</Blank>
            :<div style={{display:"flex",flexDirection:"column",gap:6}}>
              {rFiltradas.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>(
                <div key={r.id} style={{background:"var(--card)",borderRadius:12,border:"1px solid var(--border)",padding:"12px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <p style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:2}}>{r.titularName}</p>
                      <p style={{fontSize:11,color:"var(--muted)"}}>📅 {fmtDate(r.date)} • 📍 {r.location}</p>
                      {r.formaPagamento&&<p style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{r.formaPagamento}</p>}
                    </div>
                    <div style={{textAlign:"right"}}>
                      {r.valor?<p style={{fontSize:14,fontWeight:700,color:"#16a34a"}}>{fmtMoney(r.valor)}</p>:<p style={{fontSize:12,color:"var(--muted)"}}>Sem valor</p>}
                      <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:99,background:r.statusPagamento==="pago"?"#dcfce7":r.statusPagamento==="parcial"?"#fef9c3":"#fee2e2",color:r.statusPagamento==="pago"?"#15803d":r.statusPagamento==="parcial"?"#92400e":"#dc2626"}}>
                        {r.statusPagamento==="pago"?"💚 Pago":r.statusPagamento==="parcial"?"💛 Parcial":"🔴 Pendente"}
                      </span>
                    </div>
                  </div>
                </div>
              ))}
              <div style={{background:"var(--primary)",borderRadius:12,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>Total do período</span>
                <span style={{fontSize:16,fontWeight:700,color:"#fff"}}>{fmtMoney(receita)}</span>
              </div>
            </div>}
        </div>
      )}

      {tab==="despesas"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h2 style={{...sh,marginBottom:0}}>💸 Despesas</h2>
            <button onClick={()=>setSDF(s=>!s)} style={{background:"var(--primary)",color:"#fff",border:"none",borderRadius:12,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Nova</button>
          </div>

          {showDespForm&&(
            <div style={{background:"var(--card)",borderRadius:16,border:"1px solid var(--border)",padding:18,marginBottom:16}}>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",gap:10}}>
                  <Field label="Data" style={{flex:1}}><input type="date" value={despForm.data} onChange={e=>setDF(f=>({...f,data:e.target.value}))} style={inp}/></Field>
                  <Field label="Valor (R$)" style={{flex:1}}><input type="number" min="0" step="0.01" value={despForm.valor} onChange={e=>setDF(f=>({...f,valor:e.target.value}))} placeholder="0,00" style={inp}/></Field>
                </div>
                <Field label="Categoria">
                  <select value={despForm.categoria} onChange={e=>setDF(f=>({...f,categoria:e.target.value}))} style={inp}>
                    {DESP_CATS.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </Field>
                <Field label="Descrição"><input value={despForm.descricao} onChange={e=>setDF(f=>({...f,descricao:e.target.value}))} placeholder="Ex: Gasolina viagem evento João" style={inp}/></Field>
                <Field label="Forma de Pagamento">
                  <select value={despForm.formaPagamento} onChange={e=>setDF(f=>({...f,formaPagamento:e.target.value}))} style={inp}>
                    {PAGAMENTOS.map(p=><option key={p} value={p}>{p}</option>)}
                  </select>
                </Field>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={saveDespesa} style={{flex:1,background:"var(--primary)",color:"#fff",border:"none",borderRadius:10,padding:"10px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Salvar</button>
                  <button onClick={()=>setSDF(false)} style={{padding:"10px 16px",border:"1px solid var(--border)",borderRadius:10,fontSize:13,cursor:"pointer",background:"var(--card)",color:"var(--sub)",fontFamily:"inherit"}}>Cancelar</button>
                </div>
              </div>
            </div>
          )}

          {/* Gráfico */}
          {despesas.length>0&&<div style={{background:"var(--card)",borderRadius:16,border:"1px solid var(--border)",padding:16,marginBottom:16}}>
            <p style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:12}}>Por categoria (total)</p>
            <div style={{height:160}}><canvas ref={canvasRef}/></div>
          </div>}

          {despFiltradas.length===0?<Blank>Nenhuma despesa neste período</Blank>
            :<div style={{display:"flex",flexDirection:"column",gap:6}}>
              {despFiltradas.sort((a,b)=>(b.data||"").localeCompare(a.data||"")).map(d=>(
                <div key={d.id} style={{background:"var(--card)",borderRadius:12,border:"1px solid var(--border)",padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1}}>
                    <p style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:2}}>{d.categoria}</p>
                    <p style={{fontSize:11,color:"var(--muted)"}}>{fmtDate(d.data)}{d.descricao?` • ${d.descricao}`:""}</p>
                    {d.formaPagamento&&<p style={{fontSize:11,color:"var(--muted)"}}>{d.formaPagamento}</p>}
                  </div>
                  <span style={{fontSize:14,fontWeight:700,color:"#dc2626"}}>{fmtMoney(d.valor)}</span>
                  <button onClick={()=>onDeleteDespesa(d.id)} style={{fontSize:12,color:"#f87171",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
                </div>
              ))}
              <div style={{background:"#fef2f2",borderRadius:12,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,fontWeight:700,color:"#dc2626"}}>Total despesas</span>
                <span style={{fontSize:16,fontWeight:700,color:"#dc2626"}}>{fmtMoney(despTotal)}</span>
              </div>
            </div>}
        </div>
      )}

      {tab==="relatorio"&&(
        <div>
          <h2 style={sh}>📈 Relatório Anual — {filMes.split("-")[0]}</h2>
          <RelatorioAnual rentals={rentals} despesas={despesas} ano={parseInt(filMes.split("-")[0])}/>
        </div>
      )}
    </div>
  );
}

function RelatorioAnual({rentals,despesas,ano}){
  const canvasRef=useRef(null);const chartRef=useRef(null);
  const dados=useMemo(()=>MESES.map((m,i)=>{
    const key=`${ano}-${pad(i+1)}`;
    const rs=rentals.filter(r=>r.status!=="cancelado"&&(r.date||"").startsWith(key));
    const ds=despesas.filter(d=>(d.data||"").startsWith(key));
    return{m,receita:rs.reduce((s,r)=>s+Number(r.valor||0),0),despesa:ds.reduce((s,d)=>s+Number(d.valor||0),0),qtd:rs.length};
  }),[rentals,despesas,ano]);

  useEffect(()=>{
    if(!canvasRef.current)return;
    if(chartRef.current)chartRef.current.destroy();
    const isDark=document.body.classList.contains("dark");
    const gridColor=isDark?"rgba(255,255,255,.08)":"rgba(0,0,0,.06)";
    const textColor=isDark?"#94a3b8":"#9ca3af";
    chartRef.current=new Chart(canvasRef.current,{
      type:"bar",
      data:{labels:dados.map(d=>d.m),datasets:[
        {label:"Receita",data:dados.map(d=>d.receita),backgroundColor:"rgba(124,58,237,.7)",borderRadius:4},
        {label:"Despesa",data:dados.map(d=>d.despesa),backgroundColor:"rgba(239,68,68,.6)",borderRadius:4},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:textColor,font:{family:"Poppins",size:11},boxWidth:12}}},
        scales:{x:{grid:{color:gridColor},ticks:{color:textColor,font:{family:"Poppins",size:11}}},y:{grid:{color:gridColor},ticks:{color:textColor,font:{family:"Poppins",size:10},callback:v=>v>=1000?`R$${(v/1000).toFixed(0)}k`:`R$${v}`}}}}
    });
    return()=>chartRef.current?.destroy();
  },[dados]);

  const totReceita=dados.reduce((s,d)=>s+d.receita,0);
  const totDesp=dados.reduce((s,d)=>s+d.despesa,0);
  const totQtd=dados.reduce((s,d)=>s+d.qtd,0);
  const ticketMedio=totQtd>0?(totReceita/totQtd):0;

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:20}}>
        {[
          {icon:"💰",label:"Receita Anual",val:fmtMoney(totReceita),col:"#6d28d9",bg:"#f5f3ff"},
          {icon:"💸",label:"Despesas",val:fmtMoney(totDesp),col:"#dc2626",bg:"#fef2f2"},
          {icon:"📈",label:"Lucro",val:fmtMoney(totReceita-totDesp),col:totReceita-totDesp>=0?"#15803d":"#dc2626",bg:totReceita-totDesp>=0?"#f0fdf4":"#fef2f2"},
          {icon:"🎯",label:"Ticket Médio",val:fmtMoney(ticketMedio),col:"#1d4ed8",bg:"#eff6ff"},
        ].map(s=>(
          <div key={s.label} style={{background:s.bg,borderRadius:14,padding:"12px 10px"}}>
            <div style={{fontSize:18,marginBottom:4}}>{s.icon}</div>
            <div style={{fontSize:13,fontWeight:700,color:s.col,lineHeight:1.2}}>{s.val}</div>
            <div style={{fontSize:10,fontWeight:600,color:s.col,opacity:.75,marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{background:"var(--card)",borderRadius:16,border:"1px solid var(--border)",padding:16,marginBottom:20}}>
        <div style={{height:200}}><canvas ref={canvasRef}/></div>
      </div>
      <div style={{background:"var(--card)",borderRadius:16,border:"1px solid var(--border)",overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"10px 16px",borderBottom:"1px solid var(--border)"}}>
          {["Mês","Locações","Receita","Lucro"].map(h=><span key={h} style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:.5}}>{h}</span>)}
        </div>
        {dados.map((d,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"10px 16px",borderBottom:i<11?"1px solid var(--border)":"none",background:i%2===0?"var(--bg)":"var(--card)"}}>
            <span style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{MESES_FULL[i]}</span>
            <span style={{fontSize:13,color:"var(--sub)"}}>{d.qtd}</span>
            <span style={{fontSize:13,color:"#16a34a",fontWeight:600}}>{fmtMoney(d.receita)}</span>
            <span style={{fontSize:13,fontWeight:600,color:d.receita-d.despesa>=0?"#16a34a":"#dc2626"}}>{fmtMoney(d.receita-d.despesa)}</span>
          </div>
        ))}
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"12px 16px",background:"var(--primary)"}}>
          <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>TOTAL</span>
          <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{totQtd}</span>
          <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{fmtMoney(totReceita)}</span>
          <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{fmtMoney(totReceita-totDesp)}</span>
        </div>
      </div>
    </div>
  );
}

/* ── Estoque ── */
function Estoque({eq,rentals,onSave}){
  const [showForm,setSF]=useState(false);const [edit,setEdit]=useState(null);
  const [form,setForm]=useState({name:"",category:"inflável",quantity:1});
  const today=new Date().toISOString().split("T")[0];
  const usedToday=id=>rentals.filter(r=>r.status!=="cancelado"&&r.date===today).reduce((s,r)=>s+(toArr(r.items).find(i=>i.equipmentId===id)?.quantity||0),0);
  const openAdd=()=>{setEdit(null);setForm({name:"",category:"inflável",quantity:1});setSF(true);};
  const openEdit=item=>{setEdit(item);setForm({name:item.name,category:item.category,quantity:item.quantity});setSF(true);};
  const save=()=>{if(!form.name||!form.quantity)return;const qty=parseInt(form.quantity);if(edit)onSave(eq.map(e=>e.id===edit.id?{...e,...form,quantity:qty}:e));else onSave([...eq,{id:genId(),...form,quantity:qty}]);setSF(false);setEdit(null);};
  const grouped=["inflável","mobiliário","tenda"].map(cat=>({cat,items:eq.filter(e=>e.category===cat)})).filter(g=>g.items.length);
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h1 style={{fontSize:22,fontWeight:700,color:"var(--text)"}}>📦 Estoque</h1>
        <button onClick={openAdd} style={{background:"var(--primary)",color:"#fff",border:"none",borderRadius:12,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Novo Item</button>
      </div>
      {showForm&&(
        <div style={{background:"var(--card)",borderRadius:16,border:"1px solid var(--border)",padding:18,marginBottom:20}}>
          <p style={{fontWeight:700,fontSize:14,color:"var(--text)",marginBottom:14}}>{edit?"Editar":"Novo Item"}</p>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <Field label="Nome"><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Ex: Tobogã" style={inp}/></Field>
            <div style={{display:"flex",gap:10}}>
              <Field label="Categoria" style={{flex:1}}><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={inp}><option value="inflável">🏰 Inflável</option><option value="mobiliário">🪑 Mobiliário</option><option value="tenda">⛺ Tenda</option></select></Field>
              <Field label="Quantidade" style={{flex:1}}><input type="number" min="1" value={form.quantity} onChange={e=>setForm(f=>({...f,quantity:e.target.value}))} style={inp}/></Field>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={save} style={{flex:1,background:"var(--primary)",color:"#fff",border:"none",borderRadius:10,padding:"10px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Salvar</button>
              <button onClick={()=>setSF(false)} style={{padding:"10px 16px",border:"1px solid var(--border)",borderRadius:10,fontSize:13,cursor:"pointer",background:"var(--card)",color:"var(--sub)",fontFamily:"inherit"}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
      {grouped.map(({cat,items})=>(
        <div key={cat} style={{marginBottom:20}}>
          <h2 style={{fontSize:12,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>{CAT_ICONS[cat]} {cat}</h2>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {items.map(item=>{const used=usedToday(item.id),avail=item.quantity-used;return(
              <div key={item.id} style={{background:"var(--card)",borderRadius:12,border:"1px solid var(--border)",padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1}}>
                  <p style={{fontSize:14,fontWeight:600,color:"var(--text)",margin:"0 0 3px"}}>{item.name}</p>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,color:"var(--muted)"}}>Total: {item.quantity}</span>
                    {used>0&&<span style={{fontSize:11,color:"#ea580c"}}>Hoje em uso: {used}</span>}
                    <span style={{fontSize:11,fontWeight:600,color:avail===0?"#dc2626":"#16a34a"}}>{avail===0?"⛔ Indisponível":"✅ "+avail+" disponível"}</span>
                  </div>
                </div>
                <button onClick={()=>openEdit(item)} style={{fontSize:12,color:"var(--primary)",fontWeight:600,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Editar</button>
                <button onClick={()=>onSave(eq.filter(e=>e.id!==item.id))} style={{fontSize:12,color:"#f87171",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Excluir</button>
              </div>
            );})}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── Helpers ── */
const sh={fontSize:15,fontWeight:700,color:"var(--text)",marginBottom:10,marginTop:0};
const inp={width:"100%",border:"1px solid var(--border)",borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"'Poppins',system-ui,sans-serif",background:"var(--inp-bg)",color:"var(--text)"};
function Field({label,children,err,style={}}){return<div style={{flex:1,...style}}><label style={{fontSize:12,fontWeight:600,color:"var(--text)",display:"block",marginBottom:5}}>{label}</label>{children}{err&&<p style={{fontSize:11,color:"#dc2626",margin:"3px 0 0"}}>Campo obrigatório</p>}</div>;}
function IF({label,val}){return<div><p style={{fontSize:11,color:"var(--muted)",margin:"0 0 2px"}}>{label}</p><p style={{fontSize:13,fontWeight:600,color:"var(--text)",margin:0}}>{val}</p></div>;}
function Blank({children}){return<div style={{background:"var(--card)",borderRadius:16,padding:"32px 20px",textAlign:"center",color:"var(--muted)",fontSize:13,border:"1px solid var(--border)"}}>{children}</div>;}
function Alert({children,color,bg,border}){return<div style={{background:bg,border:`1px solid ${border}`,borderRadius:10,padding:"8px 12px",fontSize:12,color}}>{children}</div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
